{% extends 'base.html' %}
{% block title %}Sign in / Sign up - AItinerary{% endblock %}
{% block content %}
<div class="text-center mb-4">
    <h1 class="h2">Welcome back</h1>
    <p class="text-muted">Sign in to save preferences or create a new account to start planning your itinerary.</p>
</div>
<div class="row gy-4">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="h5 mb-3">Sign In</h2>
                {% if message %}
                <div class="alert alert-warning">{{ message }}</div>
                {% endif %}
                <form method="post" action="{{ url_for('signin') }}">
                    <input type="hidden" name="mode" value="signin" />
                    <input type="hidden" name="next" value="{{ next_url }}" />
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" placeholder="Enter username" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="Enter password" />
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="h5 mb-3">Sign Up</h2>
                <form method="post" action="{{ url_for('signin') }}">
                    <input type="hidden" name="mode" value="signup" />
                    <input type="hidden" name="next" value="{{ next_url }}" />
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" placeholder="Choose a username" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="Create a password" />
                    </div>
                    <button type="submit" class="btn btn-outline-primary w-100">Create Account</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
